                    <h2 className="text-3xl md:text-5xl font-bold text-white leading-tight">Технологии будущего уже здесь</h2>
                    <div className="text-gray-300 space-y-4 text-base md:text-lg leading-relaxed font-light border-l-4 border-[#ff6363] pl-6">
                        <p>Современная лабораторная диагностика не терпит ручного труда. В основе сети NeoLab лежит полная автоматизация: от штрихкодирования первичных пробирок до интеграции с топовыми Лабораторными Информационными Системами (ЛИС).</p>
                        <p>Использование роботизированных анализаторов от мировых брендов (Roche, Sysmex, Abbott) исключает человеческий фактор, гарантирует 100% точность и беспрецедентную скорость выдачи результатов. Открывая точку по нашей франшизе, вы получаете доступ к мощнейшей технологической базе, которая работает безупречно.</p>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-full relative">
                    {/* Постоянный фон (Фото) */}
                    <div className="fixed right-0 bottom-0 top-0 md:top-[90px] w-full md:w-[50%] z-0 pointer-events-none">
                        <div className="absolute inset-y-0 left-0 w-1/3 bg-gradient-to-r from-[#141414] to-transparent z-10 hidden md:block"></div>
                        <div className="absolute inset-0 bg-[#141414]/70 md:hidden z-10"></div>
                        <img src="мика.jpeg" alt="Мируерт Бектенова" className="w-full h-full object-cover object-top" />
                    </div>

                    {/* Эффект матового стекла (Включается везде кроме Главной) */}
                    <div 
                        className={`fixed inset-0 z-10 bg-[#141414]/70 backdrop-blur-xl transition-all duration-700 pointer-events-none ${activeSection === 'home' ? 'opacity-0' : 'opacity-100'}`} 
                    />

                    {/* Скроллируемый контейнер */}
                    <div className="z-20 flex flex-col h-full overflow-y-auto hide-scrollbar w-full relative">
                        
                        {/* Шапка */}
                        <header className="sticky top-0 w-full z-50 bg-[#141414]/80 backdrop-blur-md border-b border-white/5">
                            <div className="max-w-7xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-4 md:gap-0">
                                <div 
                                    onClick={() => setActiveSection('home')}
                                    className="text-xl font-bold tracking-[0.2em] uppercase cursor-pointer hover:text-gray-300 transition-colors"
                                >
                                    Мируерт Бектенова
                                </div>
                                <div className="flex flex-col md:flex-row items-center gap-6 md:gap-10">
                                    <nav className="flex flex-wrap justify-center gap-6 md:gap-8">
                                        {navItems.map(item => (
                                            <button 
                                                key={item.id}
                                                onClick={() => setActiveSection(item.id)} 
                                                className={`relative text-sm font-medium transition-colors pb-1 ${activeSection === item.id ? 'text-white' : 'text-gray-400 hover:text-gray-200'}`}
                                            >
                                                {item.label}
                                                {/* Линия активного меню */}
                                                {activeSection === item.id && (
                                                    <span className="absolute left-0 -bottom-1 w-full h-[2px] bg-[#ff6363] rounded-full animate-fade-in-up"></span>
                                                )}
                                            </button>
                                        ))}
                                    </nav>
                                    <button onClick={openModal} className="bg-[#ff6363] hover:bg-[#ff4f4f] text-white px-6 py-2.5 rounded-md text-sm font-medium transition-transform hover:scale-105 active:scale-95 shadow-[0_0_15px_rgba(255,99,99,0.3)] hover:shadow-[0_0_20px_rgba(255,99,99,0.5)]">
                                        Заявка на франшизу
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* Основной контент (переключается) */}
                        <main className="flex-grow flex flex-col w-full px-6 py-12">
                            <div className="max-w-7xl mx-auto w-full flex-grow flex flex-col items-center justify-center">
                                
                                {/* Кнопка возврата (показывается везде, кроме главной) */}
                                {activeSection !== 'home' && (
                                    <div className="w-full flex justify-start mb-6 md:mb-8 animate-smooth-enter">
                                        <button 
                                            onClick={() => setActiveSection('home')}
                                            className="flex items-center gap-2 text-gray-400 hover:text-white transition-all group bg-white/5 hover:bg-white/10 px-5 py-2.5 rounded-full border border-white/10 backdrop-blur-md shadow-lg"
                                        >
                                            <IconChevronLeft />
                                            <span className="text-sm font-medium">На главную</span>
                                        </button>
                                    </div>
                                )}

                                <div key={activeSection} className="animate-smooth-enter w-full">
                                    {activeSection === 'home' && <HomeContent />}
                                    {activeSection === 'about' && <AboutContent />}
                                    {activeSection === 'neolab' && <NeoLabContent />}
                                    {activeSection === 'franchise' && <FranchiseContent />}
                                    {activeSection === 'contacts' && <ContactsContent />}
                                    {activeSection === 'entrepreneurship' && <EntrepreneurshipContent />}
                                    {activeSection === 'med_business' && <MedBusinessContent />}
                                    {activeSection === 'innovations' && <InnovationsContent />}
                                </div>
                            </div>
                        </main>

                        {/* Подвал */}
                        <footer className="w-full border-t border-white/5 py-8 mt-auto">
                            <div className="max-w-7xl mx-auto px-6 flex justify-center items-center flex-wrap gap-4 text-xs md:text-sm tracking-[0.15em] text-gray-500 uppercase font-medium">
                                <button onClick={() => setActiveSection('entrepreneurship')} className="hover:text-white transition-colors cursor-pointer outline-none">ПРЕДПРИНИМАТЕЛЬСТВО</button>
                                <IconArrowRight />
                                <button onClick={() => setActiveSection('med_business')} className="hover:text-white transition-colors cursor-pointer outline-none">МЕДИЦИНСКИЙ БИЗНЕС</button>
                                <IconArrowRight />
                                <button onClick={() => setActiveSection('innovations')} className="hover:text-white transition-colors cursor-pointer outline-none">ИННОВАЦИИ</button>
                                <IconArrowRight />
                                <button onClick={() => setActiveSection('franchise')} className="hover:text-white transition-colors cursor-pointer outline-none">ФРАНШИЗА</button>
                            </div>
                        </footer>
                    </div>

                    {/* Модальное окно (Поверх всего) */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="bg-[#1e1e1e] rounded-xl w-full max-w-md p-8 relative border border-[#333] shadow-2xl animate-modal">
                                <button onClick={closeModal} className="absolute right-4 top-4 text-gray-400 hover:text-white transition-colors">
                                    <IconX />
                                </button>
                                {!isSubmitted ? (
                                    <>
                                        <h2 className="text-2xl font-bold mb-2">Заявка на франшизу</h2>
                                        <p className="text-gray-400 text-sm mb-6">Оставьте свои данные, и наша команда свяжется с вами для обсуждения деталей.</p>
                                        <form onSubmit={handleSubmit} className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-300 mb-1">Ваше имя</label>
                                                <input type="text" name="name" value={formData.name} onChange={handleChange} required placeholder="Иван Иванов" className="w-full bg-[#2a2a2a] border border-[#444] rounded-md px-4 py-3 text-white focus:outline-none focus:border-[#ff6363] focus:ring-1 focus:ring-[#ff6363] transition-colors" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-300 mb-1">Номер телефона</label>
                                                <input type="tel" name="phone" value={formData.phone} onChange={handleChange} required placeholder="+7 (___) ___-__-__" className="w-full bg-[#2a2a2a] border border-[#444] rounded-md px-4 py-3 text-white focus:outline-none focus:border-[#ff6363] focus:ring-1 focus:ring-[#ff6363] transition-colors" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-300 mb-1">Город открытия</label>
                                                <input type="text" name="city" value={formData.city} onChange={handleChange} required placeholder="Астана" className="w-full bg-[#2a2a2a] border border-[#444] rounded-md px-4 py-3 text-white focus:outline-none focus:border-[#ff6363] focus:ring-1 focus:ring-[#ff6363] transition-colors" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-300 mb-1">Планируемый бюджет</label>
                                                <select name="budget" value={formData.budget} onChange={handleChange} required className="w-full bg-[#2a2a2a] border border-[#444] rounded-md px-4 py-3 text-white focus:outline-none focus:border-[#ff6363] focus:ring-1 focus:ring-[#ff6363] transition-colors appearance-none">
                                                    <option value="">Выберите бюджет...</option>
                                                    <option value="10 000 $ - 20 000 $">10 000 $ - 20 000 $</option>
                                                    <option value="20 000 $ - 50 000 $">20 000 $ - 50 000 $</option>
                                                    <option value="Более 50 000 $">Более 50 000 $</option>
                                                </select>
                                            </div>
                                            <button type="submit" className="w-full bg-[#ff6363] hover:bg-[#ff4f4f] text-white font-bold py-3.5 rounded-md mt-6 transition-transform hover:scale-105 active:scale-95 shadow-lg shadow-[#ff6363]/20">
                                                Отправить заявку
                                            </button>
                                        </form>
                                    </>
                                ) : (
                                    <div className="flex flex-col items-center justify-center py-10 text-center">
                                        <IconCheckCircle />
                                        <h3 className="text-xl font-bold mb-2 mt-4">Заявка формируется...</h3>
                                        <p className="text-gray-400">Сейчас откроется WhatsApp для отправки данных.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
